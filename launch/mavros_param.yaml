mavros:
  ros__parameters:
    startup_px4_usb_quirk: false

    # --- system plugins ---
    conn:
      heartbeat_rate: 1.0    # send heartbeat rate in Hertz
      heartbeat_mav_type: "ONBOARD_CONTROLLER"
      timeout: 10.0          # heartbeat timeout in seconds
      timesync_rate: 10.0    # TIMESYNC rate in Hertz (feature disabled if 0.0)
      system_time_rate: 1.0  # send system time to FCU rate in Hertz (disabled if 0.0)

    sys:
      min_voltage: 10.0
      disable_diag: false

    time:
      time_ref_source: "fcu"
      timesync_mode: MAVLINK
      timesync_avg_alpha: 0.6

    # --- mavros plugins (alphabetical order) ---
    tdr_radio:
      low_rssi: 40

    cmd:
      use_comp_id_system_control: false

    global_position:
      frame_id: "map"
      child_frame_id: "base_link_drone"
      rot_covariance: 99999.0
      gps_uere: 1.0
      use_relative_alt: true
      tf:
        send: true
        frame_id: "map"
        global_frame_id: "map"
        child_frame_id: "base_link_drone"

    imu:
      frame_id: "base_link"
      linear_acceleration_stdev: 0.0003
      angular_velocity_stdev: 0.0003490659 # 0.02 degrees
      orientation_stdev: 1.0
      magnetic_stdev: 0.0

    local_position:
      frame_id: "map"
      tf:
        send: false
        frame_id: "map"
        child_frame_id: "base_link"
        send_fcu: false

    safety_area:
      p1: {x:  1.0, y:  1.0, z:  1.0}
      p2: {x: -1.0, y: -1.0, z: -1.0}

    setpoint_accel:
      send_force: false

    setpoint_attitude:
      reverse_thrust: false
      use_quaternion: false
      tf:
        listen: false
        frame_id: "map"
        child_frame_id: "target_attitude"
        rate_limit: 50.0

    setpoint_raw:
      thrust_scaling: 1.0

    setpoint_position:
      tf:
        listen: false
        frame_id: "map"
        child_frame_id: "target_position"
        rate_limit: 50.0
      mav_frame: LOCAL_NED

    setpoint_velocity:
      mav_frame: LOCAL_NED

    mission:
      pull_after_gcs: true
      use_mission_item_int: true

    distance_sensor:
      front:
        frame_id: "drone_with_sonar::base_sonar_front"
        subscriber: true
        id: 0
        orientation: NONE
        max_range: 6.5
      left:
        frame_id: "drone_with_sonar::base_sonar_left"
        subscriber: true
        id: 2
        orientation: YAW_270
      right:
        frame_id: "drone_with_sonar::base_sonar_right"
        subscriber: true
        id: 3
        orientation: YAW_90
      back:
        frame_id: "drone_with_sonar::base_sonar_left"
        subscriber: true
        id: 4
        orientation: YAW_180

    image:
      frame_id: "px4flow"

    fake_gps:
      use_mocap: true
      mocap_transform: false
      mocap_withcovariance: false
      use_vision: false
      use_hil_gps: true
      gps_id: 4
      geo_origin:
        lat: 47.3667
        lon: 8.5500
        alt: 408.0
      eph: 2.0
      epv: 2.0
      horiz_accuracy: 0.5
      vert_accuracy: 0.5
      speed_accuracy: 0.0
      satellites_visible: 6
      fix_type: 3
      tf:
        listen: false
        send: false
        frame_id: "map"
        child_frame_id: "fix"
        rate_limit: 10.0
      gps_rate: 5.0

    landing_target:
      listen_lt: false
      mav_frame: "LOCAL_NED"
      land_target_type: "VISION_FIDUCIAL"
      image:
        width: 640
        height: 480
      camera:
        fov_x: 2.0071286398
        fov_y: 2.0071286398
      tf:
        send: true
        listen: false
        frame_id: "landing_target"
        child_frame_id: "camera_center"
        rate_limit: 10.0
      target_size: {x:  0.3, y:  0.3}

    mocap:
      use_tf: false
      use_pose: true

    odometry:
      frame_tf:
        desired_frame: "ned"
      estimator_type: 3

    px4flow:
      frame_id: "px4flow"
      ranger_fov: 0.118682
      ranger_min_range: 0.3
      ranger_max_range: 5.0

    vision_pose:
      tf:
        listen: false
        frame_id: "map"
        child_frame_id: "vision_estimate"
        rate_limit: 10.0

    vision_speed:
      listen_twist: true
      twist_cov: true

    vibration:
      frame_id: "base_link"

    wheel_odometry:
      count: 2
      use_rpm: false
      wheel0: {x: 0.0, y: -0.15, radius: 0.05}
      wheel1: {x: 0.0, y:  0.15, radius: 0.05}
      send_raw: true
      send_twist: false
      frame_id: "map"
      child_frame_id: "base_link"
      vel_error: 0.1
      tf:
        send: true
        frame_id: "map"
        child_frame_id: "base_link"
